<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMI Central // Intelligence Hub</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">PMI CENTRAL INFORMÁTICA</div>
      <div class="status" id="status">Inicializando feeds...</div>
      <div class="clocks">
        <span id="clock-local">Local --:--:--</span>
        <span id="clock-utc">UTC --:--:--</span>
      </div>
    </header>

    <main class="layout">
      <aside class="left">
        <section class="panel">
          <h3>Filtros de inteligencia</h3>
          <label>Países (CSV)
            <input id="countries" value="USA,BRA,MEX,COL" />
          </label>
          <label>Continentes (CSV)
            <input id="continents" value="North America,South America" />
          </label>
          <label>Categorías (CSV)
            <input id="categories" value="politica,acciones,macro,geopolitica,energia" />
          </label>
          <label>Palabra clave
            <input id="keyword" placeholder="ejemplo: inflation" />
          </label>
          <label>Límite de noticias
            <input id="limit" type="number" min="20" max="250" value="120" />
          </label>
          <button id="apply-filters">Actualizar central</button>
        </section>

        <section class="panel">
          <h3>Watchlist operacional</h3>
          <div id="watchlist"></div>
        </section>

        <section class="panel">
          <h3>Contexto de activo</h3>
          <div id="asset-context"></div>
        </section>
      </aside>

      <section class="center">
        <section class="panel">
          <h3>Mapa operativo 2D (manual)</h3>
          <div id="ops-map"></div>
        </section>
        <section class="panel">
          <h3>Radar de eventos (tipo feed en vivo)</h3>
          <div id="event-radar"></div>
        </section>
      </section>

      <aside class="right">
        <section class="panel">
          <h3>Noticias masivas</h3>
          <div id="news-feed"></div>
        </section>

        <section class="panel">
          <h3>Agrupaciones</h3>
          <div id="aggregations"></div>
        </section>

        <section class="panel">
          <h3>Country Intelligence</h3>
          <div id="country-card"></div>
        </section>
      </aside>
    </main>

    <footer class="ribbon" id="ribbon"></footer>
    <script src="/static/app.js"></script>
  </body>
</html>
